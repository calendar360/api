services:
  db:
    image: postgres:18
    container_name: cal360db
    restart: always
    env_file:
      - ./db/.env
    volumes:
      - ./db/data:/var/lib/postgresql
    ports:
      - "5433:5432"
    networks:
      - cal360_net


  api:
    image: davidudoji/cal360api:latest
    container_name: cal360api
    restart: always
    expose:
      - "4000"
    ports:
      - "4000:4000"
    depends_on:
      - db
    env_file:
      - ./api/.env
    volumes:
      - ./api/uploads:/app/uploads
    networks:
      - cal360_net

volumes:
  cal360_pg_data:
